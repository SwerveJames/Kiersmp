<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="background-page-container">
        <img class="background-page" src="./imgs/BG.png">
    </div>

   
    
    
    <div class="top-bar">
        <img class="top-bar-logo" src="./imgs/Kiersmp-logo.png">
        <div class="btns-holder">
            <button class="btns">Home</button>
            <span class="spacing">|</span>
            <button class="btns">Rules</button>
            <span class="spacing">|</span>
            <button class="btns">Store</button>
            <span class="spacing">|</span>
            <button class="btns">Discord</button>
            
        </div>

        

    </div>
    
    
    <span class="logo-container"><img class="logo" src="./imgs/Kiersmp-logo.png"></span>
    <div class="copy-ip">
        <button class="copy-ip-btn">COPY IP</button>
        <span class="copy-ip-text">Kiersmp.net</span>
    </div>

    <div class="sidepanels-and-options">

        <div class="side-panels-holder">
            <div class="side-panel">
                <h3 style="margin-top: 0; color: #a3ffaf;">ABOUT KIER SMP</h3>
                <p>A vanilla+ survival experience with a twist.</p>
                <p>We are a tightly knit community built on respect and adventure.</p>
            </div>
        </div>
        

        <div class="Options-holder">
            <a target="_blank" href="https://store.kiersmp.net/">
                <div id="store" class="Option">
                    <img class="icon chest" src="./imgs/chest.png">
                    <p class="Option-text">Store</p>
                </div>

            </a>
            

            <div id="news" class="Option">
                <img class="icon news" src="./imgs/news.png">
                <p class="Option-text">News</p>
            </div>

            <div id="server-stat" class="Option">
                <img class="icon status" src="./imgs/status.png">
                <p class="Option-text">Server Status</p>
            </div>


            <div id="community" class="Option Big-Option">
                <img class="icon-large" src="./imgs/Community.png">
                
                <p class="Option-text">Join the community</p>
            </div> 

            <div class="Big-Option-video">
                <iframe class="video" src="https://www.youtube.com/embed/egdNANsGe8E" title="How I Accidentally Got LT3..." frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

        </div>

        <div class="side-panels-holder">
            <div class="large-side-panel">
                <h3 style="margin-top: 0; color: #a3ffaf;">Update Logs</h3>
                <p>Tis gonna take some time to make it look good ✌️💔</p>
                
            </div>
        </div>

        

        
        
    </div>
    <div class="bottom-bar">

    </div>


    

</body>
</html>
